<!DOCTYPE html>
<html lang="so">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Black Glass Calculator</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            /* Sawirka barafka ee asalka ah */
            background: url('https://images.unsplash.com/photo-1483921020237-2ff51e8e4b22?q=80&w=2070&auto=format&fit=crop') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        .calculator {
            /* Midabka madow oo saafi ah (Solid Black) balse xoogaa hufan */
            background: rgba(0, 0, 0, 0.9); 
            backdrop-filter: blur(15px); /* Wuxuu blur gareynayaa sawirka gadaal ka muuqda */
            padding: 30px 20px;
            border-radius: 40px;
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
            width: 340px;
            min-height: 620px;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        #display {
            width: 100%;
            height: 140px;
            font-size: 4.5rem;
            text-align: right;
            border: none;
            background: transparent;
            color: white;
            margin-bottom: 20px;
            outline: none;
            padding: 0 15px;
            box-sizing: border-box;
            font-weight: 300;
        }

        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
        }

        button {
            height: 70px;
            width: 70px;
            border-radius: 50%;
            border: none;
            font-size: 1.6rem;
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 500;
        }

        button:active {
            transform: scale(0.9);
        }

        /* Midabada Badhamada - Dark Style */
        .number { 
            background-color: #1a1a1a; /* Madow khafiif ah */
            color: white; 
        }
        .number:hover { background-color: #262626; }

        .operator { 
            background-color: #ff9f0a; /* Orange (sida iPhone-ka dhabta ah) */
            color: white; 
        }

        .function { 
            background-color: #3d3d3d; 
            color: white; 
        }
        
        .zero {
            grid-column: span 2;
            width: 155px;
            border-radius: 40px;
            text-align: left;
            padding-left: 30px;
        }

        .equal { 
            background-color: #ff9f0a; 
        }
    </style>
</head>
<body>

<div class="calculator">
    <input type="text" id="display" disabled placeholder="0">
    <div class="buttons">
        <button class="function" onclick="clearDisplay()">AC</button>
        <button class="function" onclick="deleteLast()">DEL</button>
        <button class="function" onclick="appendToDisplay('%')">%</button>
        <button class="operator" onclick="appendToDisplay('/')">÷</button>
        
        <button class="number" onclick="appendToDisplay('7')">7</button>
        <button class="number" onclick="appendToDisplay('8')">8</button>
        <button class="number" onclick="appendToDisplay('9')">9</button>
        <button class="operator" onclick="appendToDisplay('*')">×</button>
        
        <button class="number" onclick="appendToDisplay('4')">4</button>
        <button class="number" onclick="appendToDisplay('5')">5</button>
        <button class="number" onclick="appendToDisplay('6')">6</button>
        <button class="operator" onclick="appendToDisplay('-')">−</button>
        
        <button class="number" onclick="appendToDisplay('1')">1</button>
        <button class="number" onclick="appendToDisplay('2')">2</button>
        <button class="number" onclick="appendToDisplay('3')">3</button>
        <button class="operator" onclick="appendToDisplay('+')">+</button>
        
        <button class="number zero" onclick="appendToDisplay('0')">0</button>
        <button class="number" onclick="appendToDisplay('.')">.</button>
        <button class="operator equal" onclick="calculate()">=</button>
    </div>
</div>

<script>
    const display = document.getElementById('display');

    function appendToDisplay(input) {
        if (display.value === "Error") display.value = "";
        display.value += input;
    }

    function clearDisplay() {
        display.value = "";
    }

    function deleteLast() {
        display.value = display.value.slice(0, -1);
    }

    function calculate() {
        try {
            if (display.value === "") return;
            let result = eval(display.value);
            display.value = Number.isInteger(result) ? result : result.toFixed(2);
        } catch (error) {
            display.value = "Error";
        }
    }
</script>

</body>
</html>
